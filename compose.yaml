services:
  postgres:
    image: postgres:16-alpine
    container_name: zefyr-office-map-postgres
    env_file: local.env
    environment:
      POSTGRES_DB: office_map
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./supabase/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./supabase/seed_local_dev.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d office_map"]
      interval: 5s
      timeout: 5s
      retries: 10
